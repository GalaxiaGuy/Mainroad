{{ $src := $.Page.Resources.GetMatch (.Get "src") }}
{{ $alt := .Get "alt" }}
{{ $title := .Get "title" }}
{{ $backgroundColor := default "transparent" (.Get "backgroundColor") }}
{{ $height := .Get "height" }}

<figure>
	<img src="{{ $src.RelPermalink }}" alt="{{ $alt }}" style="background-color: {{ $backgroundColor }}{{ if $height }}; height: {{ $height }}{{ end }}" />
	<figcaption>{{ $title }}</figcaption>
</figure>
